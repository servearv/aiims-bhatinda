# docker-compose.yml — Run AIIMS Bathinda locally with Postgres
# Works with both Docker Compose and Podman Compose.
#
# Usage:
#   docker compose up --build        (Docker)
#   podman-compose up --build        (Podman)
#
# The app will be available at http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiims
      POSTGRES_PASSWORD: aiims_pass
      POSTGRES_DB: aiims_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiims -d aiims_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgresql://aiims:aiims_pass@db:5432/aiims_db
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key}
      SMTP_EMAIL: ${SMTP_EMAIL:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOKI_URL: "http://loki:3100/loki/api/v1/push"
    depends_on:
      db:
        condition: service_healthy
      loki:
        condition: service_started

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./data/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true

volumes:
  pgdata:
  loki_data:
  grafana_data:
