# docker-compose.yml — Run AIIMS Bathinda locally with Postgres
# Works with both Docker Compose and Podman Compose.
#
# Usage:
#   docker compose up --build        (Docker)
#   podman-compose up --build        (Podman)
#
# The app will be available at http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiims
      POSTGRES_PASSWORD: aiims_pass
      POSTGRES_DB: aiims_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiims -d aiims_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgresql://aiims:aiims_pass@db:5432/aiims_db
      SECRET_KEY: local-dev-secret-key
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
